<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lurdinha - Laboratório de sons</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f13;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(139, 92, 246, 0.18);
        --stroke: rgba(255, 255, 255, 0.1);
        --stroke-active: rgba(196, 181, 253, 0.5);
        --text: #f8fafc;
        --muted: rgba(255, 255, 255, 0.62);
        --primary: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 80% 8%, rgba(139, 92, 246, 0.24), transparent 30%),
          radial-gradient(circle at 12% 86%, rgba(253, 230, 138, 0.12), transparent 34%),
          linear-gradient(135deg, #111118, #181124 48%, var(--bg));
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
        margin: 0 auto;
        padding: 32px 18px 56px;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 6vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .hero {
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 18px;
        border: 1px solid rgba(196, 181, 253, 0.18);
        border-radius: 24px;
        background: var(--panel);
        margin-bottom: 28px;
      }

      .hero-icon {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: rgba(253, 230, 138, 0.14);
        flex: 0 0 auto;
      }

      section {
        margin-bottom: 28px;
      }

      h2 {
        margin: 0 0 12px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 10px;
      }

      button {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 12px;
        align-items: center;
        width: 100%;
        min-height: 74px;
        padding: 12px 14px;
        border: 1px solid var(--stroke);
        border-radius: 18px;
        background: var(--panel);
        color: inherit;
        cursor: pointer;
        text-align: left;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      }

      button:hover,
      button.active {
        transform: translateY(-1px);
        border-color: var(--stroke-active);
        background: var(--panel-strong);
      }

      .play {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 14px;
        background: var(--primary);
        font-size: 15px;
      }

      .name {
        display: block;
        margin-bottom: 4px;
        font-size: 15px;
        font-weight: 800;
      }

      .use {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .file {
        color: rgba(255, 255, 255, 0.4);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Laboratório de sons</h1>
        <p>Clique em cada opção para ouvir os sons candidatos do Lurdinha.</p>
      </header>

      <div class="hero">
        <div class="hero-icon">✨</div>
        <p>Estes são os mesmos arquivos adicionados em <strong>assets/sounds</strong>. Teste com volume baixo e depois no celular para decidir quais entram no app.</p>
      </div>

      <div id="sound-root"></div>
    </main>

    <script>
      const groups = [
        {
          title: "UI básica",
          sounds: [
            ["ui_tap_soft", "UI Tap Soft", "Botões secundários"],
            ["ui_tap_primary", "UI Tap Primary", "Responder, Continuar, Próximo"],
            ["ui_back", "UI Back", "Voltar e fechar"],
            ["ui_disabled", "UI Disabled", "Ação bloqueada"],
            ["ui_toggle", "UI Toggle", "Switches e seleções"],
          ],
        },
        {
          title: "Resposta e voto",
          sounds: [
            ["option_select", "Option Select", "Escolher alternativa"],
            ["answer_submit", "Answer Submit", "Enviar resposta"],
            ["answer_success", "Answer Success", "Acerto ou resposta salva"],
            ["answer_error", "Answer Error", "Erro ou validação"],
          ],
        },
        {
          title: "Rodada e resultado",
          sounds: [
            ["next_round", "Next Round", "Próxima rodada"],
            ["reveal", "Reveal", "Revelar resultado"],
            ["countdown_tick", "Countdown Tick", "Contagem 3, 2, 1"],
            ["winner", "Winner", "Vencedor ou ranking"],
            ["notification_in_app", "Notification In App", "Aviso dentro do app"],
          ],
        },
      ];

      const root = document.getElementById("sound-root");
      let currentAudio = null;
      let activeButton = null;

      groups.forEach((group) => {
        const section = document.createElement("section");
        section.innerHTML = `<h2>${group.title}</h2><div class="grid"></div>`;
        const grid = section.querySelector(".grid");

        group.sounds.forEach(([id, name, use]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.innerHTML = `
            <span class="play">▶</span>
            <span><span class="name">${name}</span><span class="use">${use}</span></span>
            <span class="file">${id}</span>
          `;
          button.addEventListener("click", () => {
            if (currentAudio) {
              currentAudio.pause();
              currentAudio.currentTime = 0;
            }
            if (activeButton) activeButton.classList.remove("active");

            currentAudio = new Audio(`../assets/sounds/${id}.wav`);
            currentAudio.volume = 0.85;
            currentAudio.play();
            activeButton = button;
            button.classList.add("active");
          });
          grid.appendChild(button);
        });

        root.appendChild(section);
      });
    </script>
  </body>
</html>
